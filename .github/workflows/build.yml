# CI: Build frontend and Docker image on push to develop/main.
# - Push to develop: build and push only if develop has unique commits (skip if develop == main, e.g. after merging main back).
# - Push to main: always build and push. One image per branch when it actually has new work.
# - Pull request targeting main: skip (main will build on merge); only main run matters.
# develop → ghcr.io/OWNER/algodiscovery-frontend:develop, main → :main
name: Build and Push

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    # Do not run at all for PRs targeting main (main will build on merge); avoids spinning a runner.
    if: github.event_name != 'pull_request' || github.base_ref != 'main'
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Skip redundant develop build
        id: skipcheck
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" = "refs/heads/develop" ] && [ "${{ github.event_name }}" = "push" ]; then
            git fetch origin main
            if [ "$(git rev-parse HEAD)" = "$(git rev-parse origin/main)" ]; then
              echo "skip=true" >> $GITHUB_OUTPUT
              echo "Skipping: develop is at same commit as main (redundant image)."
            else
              echo "skip=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node
        if: steps.skipcheck.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        if: steps.skipcheck.outputs.skip != 'true'
        run: npm ci

      - name: Build (develop=stage, main=prod)
        if: steps.skipcheck.outputs.skip != 'true'
        env:
          DISABLE_ESLINT_PLUGIN: 'true'
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            npm run build:prod
          else
            npm run build:stage
          fi

      - name: Set up Docker Buildx
        if: steps.skipcheck.outputs.skip != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Set build env
        if: steps.skipcheck.outputs.skip != 'true'
        id: buildenv
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "env=prod" >> $GITHUB_OUTPUT
          else
            echo "env=stage" >> $GITHUB_OUTPUT
          fi

      - name: Set image tag
        if: steps.skipcheck.outputs.skip != 'true'
        id: imagetag
        run: |
          # Docker tags may not contain /; use [a-zA-Z0-9_.-] only
          SAFE_TAG=$(echo "${{ github.ref_name }}" | sed 's/\//-/g')
          echo "tag=${SAFE_TAG}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        if: github.event_name == 'push' && steps.skipcheck.outputs.skip != 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: steps.skipcheck.outputs.skip != 'true'
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: ${{ github.event_name == 'push' }}
          load: ${{ github.event_name != 'push' }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/algodiscovery-frontend:${{ steps.imagetag.outputs.tag }}
          build-args: BUILD_ENV=${{ steps.buildenv.outputs.env }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
